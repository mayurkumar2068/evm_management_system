name: evm_management_system
description: "EVM Management System is a mobile-based inventory and tracking solution developed for the Election Commission of India to manage Control Units and Ballot Units using Barcode/QR scanning, real-time stock monitoring, audit trails, offline synchronization, and reporting dashboards, ensuring secure and transparent EVM lifecycle management."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.2
  dio: ^5.9.2
  flutter_dotenv: ^6.0.1
  flutter_secure_storage: ^10.3.1
  local_auth: ^2.3.0
  easy_localization: ^3.0.8
  mobile_scanner: ^7.2.0
  fl_chart: 0.69.2
  logger: ^2.7.0
  connectivity_plus: ^7.1.1
  path_provider: ^2.1.5
  intl: ^0.20.2
  share_plus: ^12.0.2
  uuid: ^4.5.3
  crypto: ^3.0.7
  google_fonts: ^6.3.2
  flutter_inappwebview: ^6.1.5
  permission_handler: ^11.4.0
  geolocator: ^13.0.4
  url_launcher: ^6.3.1
  image_picker: ^1.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.9.0
  mocktail: ^1.0.5
  flutter_launcher_icons: ^0.14.4

# Launcher icon generation (run: dart run flutter_launcher_icons).
# Uses the MP State Election Commission emblem on a white background so the
# launcher icon matches the in-app branding.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon_foreground.png"
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/env/dev.env
    - assets/env/uat.env
    - assets/env/prod.env
    - assets/translations/en.json
    - assets/translations/hi.json
    - assets/certs/
    - assets/images/

name: Deploy Survey Web (GitHub Pages)

on:
  push:
    branches: [main]
    paths:
      - 'survey_web/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: survey_web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: survey_web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build:pages

      - name: Prepare Pages artifact
        run: |
          SITE=dist/mp-election-survey/browser
          touch "$SITE/.nojekyll"
          cp "$SITE/index.html" "$SITE/404.html"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: survey_web/dist/mp-election-survey/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

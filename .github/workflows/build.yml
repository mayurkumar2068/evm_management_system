name: Build

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FLUTTER_VERSION: "3.44.3"

jobs:
  android:
    name: Android (${{ matrix.flavor }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [dev, uat, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build APK (${{ matrix.flavor }})
        run: >
          flutter build apk --release
          -t lib/main.dart
          --dart-define=APP_FLAVOR=${{ matrix.flavor }}
          --build-name=${{ github.ref_name }}
          --build-number=${{ github.run_number }}

      - uses: actions/upload-artifact@v4
        with:
          name: evm-${{ matrix.flavor }}-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  ios:
    name: iOS (${{ matrix.flavor }})
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        flavor: [dev, uat, prod]
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get

      - name: Build iOS (no codesign, ${{ matrix.flavor }})
        run: >
          flutter build ios --release --no-codesign
          -t lib/main.dart
          --dart-define=APP_FLAVOR=${{ matrix.flavor }}
          --build-name=${{ github.ref_name }}
          --build-number=${{ github.run_number }}
